services:
  app:
    build: .
    container_name: oa-app
    restart: unless-stopped
    network_mode: host
    environment:
      NODE_ENV: production
      PORT: 6021
      # Use MongoDB running on host machine (systemd mongod)
      MONGO_URI: mongodb://127.0.0.1:27017/oa_checker
    env_file:
      - .env

  # Only started if you explicitly run with --profile with-mongo.
  # Not used by default: this server already has mongod running natively.
  mongo:
    image: mongo:7
    container_name: oa-mongo
    profiles: ["with-mongo"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
